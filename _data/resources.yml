- name: "AARP"
  url: "https://www.aarp.org/caregiving/"
  description: "Provides education and information on aging, dementia, and caregiving. AARP has an online community where caregivers can share tips and stories."

- name: "Administration for Community Living"
  url: "https://acl.gov/"
  description: "Provides database with links to helpful information on caregiving-specific issues and access to health and wellness networks."

- name: "Alzheimers.gov"
  url: "https://www.alzheimers.gov/"
  description: "Provides facts and resources on dementia and caring for a loved one with dementia, and information regarding federally funded research and clinical trials."

- name: "BenefitsCheckUp"
  url: "https://www.benefitscheckup.org/"
  description: "BenefitsCheckUp connects millions of older adults and people with disabilities with benefits programs that can help pay for health care, medicine, food, utilities, and more."

- name: "Eldercare Locator"
  url: "https://eldercare.acl.gov/"
  description: "The Eldercare Locator is a nationwide service that connects older Americans and their caregivers with local support resources, including aging agencies and community organizations."

- name: "Family Caregiver Alliance"
  url: "https://www.caregiver.org/"
  description: "Family Caregiver Alliance supports family caregivers of adults with physical and cognitive impairments like dementia. They offer services such as care planning, skills training, wellness programs, respite services, and legal/financial consultation vouchers."

- name: "National Institute on Aging"
  url: "https://www.nia.nih.gov/"
  description: "Provides education on dementia and offers resources for caregivers. Contains information on emerging news and accessing research and/or clinical trials opportunities."

- name: "Alzheimer's Foundation of America"
  url: "https://alzfdn.org/"
  description: "Helpline, telephone-based support groups, fact sheets, webinars, and activity ideas for you and your loved one."
  phone: "Social Work Helpline: 866-242-8484"

- name: "Alzheimer's Association"
  url: "https://www.alz.org/"
  description: "Provides information, tips, and support for caregivers. 24/7 hotline and live chat available."
  phone: "24/7 Helpline: 800-272-3900"

- name: "Caregiver Resource Network"
  url: "https://www.caregiversupportnetwork.org/"
  description: "Supports family caregivers through education, peer support, and resources, catering to diverse needs from caring for children with health issues to assisting aging parents, and more."
  phone: "Caregiver Help Desk: 855-277-3640"

- name: "Powerful Tools for Caregivers"
  url: "https://www.powerfultoolsforcaregivers.org/"
  description: "Free six-week course offered in-person or online that teaches caregivers to more effectively care for themselves and their loved ones. The curriculum is available in English, French, Korean, and Spanish. The caregiver class is available online or in-person, depending on location."

- name: "The 36 Hour Day (book)"
  url: ""
  description: "The 36 Hour Day: A Family Guide to Caring for People Who Have Alzheimer's Disease, Other Dementias, and Memory Loss is an essential guidebook full of practical, detailed, and compassionate advice for those caring for a Person with Dementia."

- name: "Dementia Friendly America"
  url: "https://www.dfamerica.org/"
  description: "A national network of communities, organizations and individuals seeking to ensure that communities across the U.S. are equipped to support people living with dementia and their caregivers."

- name: "VA Caregiver Support Programs"
  url: "https://www.caregiver.va.gov/"
  description: "Find a support line, caregiver support coordinator, programs specific to caregivers of veterans, and other resources such as self-care activities and tips and tools."

- name: "The Association for Frontotemporal Degeneration (AFTD)"
  url: "https://www.theaftd.org/"
  description: "Enhancing the lives of those affected by FTD through research, awareness, support, education, and advocacy."

- name: "ConsumerNotice.Org - Elder Fraud Guide"
  url: "https://www.consumernotice.org/elder-fraud/"
  description: "Consumernotice.org has published an Elder Fraud guide that covers common scams, red flags to look out for and provides step by step instructions on your to protect yourself or a relative."

- name: "Any Care Counts - New York"
  url: "https://anycarecounts.ny.gov/"
  description: "The Any Care Counts - New York Campaign is a way to recognize and support the millions of unpaid caregivers across the state by connecting them to available support resources in New York."

- name: "Alzheimer's LA"
  url: "https://www.alzheimersla.org/"
  description: "Alzheimer's LA is a nonprofit organization dedicated to supporting families affected by Alzheimer's and other dementias through free programs, education, and advocacy, with a focus on the Los Angeles community."

- name: "Lorenzo's House"
  url: "https://lorenzoshouse.org/"
  description: "Lorenzo's House is a non-profit dedicated to supporting families affected by younger-onset dementia, diagnosed before age 65. They offers virtual programs and encourage affected families, friends, and volunteers to engage and advocate for dementia justice."

- name: "Bet Tzedek"
  url: "https://www.bettzedek.org/"
  description: "Bet Tzedek is a nonprofit law firm located in the heart of Los Angeles. They provide free legal services, outreach and education, and policy advocacy for individuals and families across Los Angeles County and beyond."

- name: "Hilarity for Charity"
  url: "https://hilarityforcharity.org/"
  description: "Hilarity for Charity (HFC) is a national non-profit on a mission to care for families impacted by Alzheimer's disease, activate the next generation of Alzheimer's advocates, and be a leader in brain health research and education."
