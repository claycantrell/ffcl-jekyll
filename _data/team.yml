- name: "Francesca Falzarano, PhD"
  title: "Lab Director"
  photo: "falzarano.webp"
  group: "leadership"
  bio: "Dr. Falzarano, Director of The FFCL, is a developmental psychologist and Assistant Professor at the University of Southern California's Leonard Davis School of Gerontology. Motivated by her own experiences serving as the primary caregiver for both parents from a young age, Dr. Falzarano's research aims to understand and address the diverse, evolving needs of caregivers throughout the dementia journey, from diagnosis to bereavement, and examine how to leverage technology to better support family caregivers. She is currently funded by the National Institute on Aging to develop and evaluate a web-based tool that connects caregivers with relevant resources to meet their needs. Her overall goal is to establish a line of innovative, technology-based intervention work to connect vulnerable caregivers with personalized resources to enhance well-being."

- name: "Annabelle Greenfield"
  title: "Research Coordinator"
  photo: "greenfield.webp"
  group: "leadership"
  bio: "Annabelle joined the FFCL in September 2022 after graduating magna cum laude with a Bachelor of Science in Psychology from Fordham University earlier that year. As a Research Coordinator in the FFCL, she has dedicated her work to improving the well-being of dementia family caregivers and understanding community needs through user-centered, technology-based interventions. Annabelle is also currently pursuing a Master of Science in Applied Technology and Aging at USC's Leonard Davis School of Gerontology, where she continues to develop expertise in gerontechnology and age-related research."

- name: "Kate Bumbalova"
  title: "Research Assistant"
  photo: "bumbalova.webp"
  group: "research_assistants"
  bio: "Kate is an undergraduate student at the University of Washington who joined the FFCL team in March 2023. Majoring in Psychology and Data Science, she plans to pursue a master's degree in Gerontology after graduation. She hopes to work directly with individuals experiencing neurodegenerative conditions and those that care for them, while also exploring opportunities in policy to advocate and bring meaningful change to the field."

- name: "Elizabeth Rojas"
  title: "Research Assistant"
  photo: "rojas.webp"
  group: "research_assistants"
  bio: "Elizabeth Rojas, a two-time graduate of the University of Southern California, is currently a first-year PhD student in the USC Leonard Davis School of Gerontology. As a Research Assistant in the Falzarano Family Caregiving Lab, Elizabeth is interested in understanding caregiving for patients affected by cognitive decline and its implications on an expert level. A gerontologist by training, Elizabeth's ultimate ambition is to help older adults and their families alleviate their most acute stressors."

- name: "Marguerite Larson"
  title: "Research Assistant"
  photo: "larson.webp"
  group: "research_assistants"
  bio: "Marguerite is an undergraduate student at the University of Southern California who joined the FFCL team in May 2024. She is majoring in Human Development and Aging on the social science track and is minoring in dance. She hopes to make an impact on the well-being of older adults by focusing on enhancing their lives through research and advocacy."

- name: "Hannah Mason"
  title: "Research Assistant"
  photo: "mason.webp"
  group: "research_assistants"
  bio: "Hannah joined the FFCL as a research assistant in October 2022. She graduated from Fordham University with a BS in Biological Sciences and Psychology in 2023. Hannah is currently a research assistant at Weill Cornell Medicine's Center of Aging and Behavioral Research. She plans to pursue a PhD in neuroscience focusing on neurodegenerative disease."

- name: "Karen Li"
  title: "Research Assistant"
  photo: "li.webp"
  group: "research_assistants"
  bio: "Karen is an undergraduate student at the University of Southern California who joined the FFCL team in January 2025. With a strong passion for the medical humanities, community engagement, and advocacy work in health and social justice, she hopes to pursue a Master's degree in Narrative Medicine before attending medical school. In the future, she aims to integrate her background in gerontology with her interests in Narrative Medicine and trauma-informed care to support patients and their caregivers as a physician."

- name: "Maaha Hashmani"
  title: "Research Assistant"
  photo: "hashmani.webp"
  group: "research_assistants"
  bio: "Maaha is an undergraduate student at the University of Southern California pursuing a dual degree in Human Development & Aging and Health & Human Sciences. She joined the FFCL team in August 2025. Inspired by the caregiving experiences of her grandparents and parents, she developed a deep passion for supporting older adults and their families. She hopes to not only improve the well-being of aging populations but also celebrate their resilience, wisdom, and stories."

- name: "Nisa Qureshi"
  title: "Research Assistant"
  photo: "qureshi.webp"
  group: "research_assistants"
  bio: "Nisa is an undergraduate student at the University of Southern California who joined the FFCL team in November 2025. She is pursuing a degree in Psychology with the goal of improving individuals' wellbeing, both mentally and physically. Inspired by her experiences caring for her grandparents, she has developed a strong passion for supporting older adults and their caregivers. In the future, Nisa hopes to combine her background in psychology with her work in this lab to better serve patients and caregivers."
